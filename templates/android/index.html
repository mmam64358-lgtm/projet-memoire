<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Simulator - Sequence App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="phone-frame">
        <!-- Android Status Bar -->
        <div class="status-bar">
            <span class="time">10:30</span>
            <div class="icons">
                <span class="wifi">📶</span>
                <span class="battery">🔋 95%</span>
            </div>
        </div>

        <!-- App Container -->
        <div class="app-ui">
            <header class="app-toolbar">
                <span class="nav-icon">☰</span>
                <h2>Calcul Suite Math</h2>
            </header>

            <main class="content">
                <div class="input-card">
                    <label>Valeur Actuelle (U<sub>n</sub>)</label>
                    <input type="number" id="editText1" class="android-edittext" value="2">
                </div>

                <div class="button-row">
                    <button id="btn_next" class="android-btn primary">CALCUL NEXT</button>
                    <button id="btn_initialiser" class="android-btn secondary">INITIALISER</button>
                </div>

                <div class="result-display">
                    <span class="label">Résultat U<sub>n+1</sub> :</span>
                    <h1 id="textView2" class="android-textview">--</h1>
                </div>

                <div class="log-section">
                    <p class="formula-info">Formule: U<sub>n+1</sub> = 3 × U<sub>n</sub> + 1</p>
                </div>

                <div class="android-history">
                    <h3>HISTORIQUE</h3>
                    <ul id="android-history-list">
                        
                    </ul>
                </div>
            </main>

            <!-- Android Navigation Bar -->
            <div class="nav-bar">
                <div class="nav-btn">◀</div>
                <div class="nav-btn-circle"></div>
                <div class="nav-btn-square"></div>
            </div>
        </div>
    </div>

    <div class="code-preview">
        <h3>Code Android (Java)</h3>
        <pre id="java-code">

        </pre>
    </div>

    <script src="script.js"></script>
</body>

</html>
